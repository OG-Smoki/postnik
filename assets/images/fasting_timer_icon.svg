<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Outer circle (stopwatch style) -->
  <circle cx="512" cy="560" r="360" stroke="black" stroke-width="40"/>
  
  <!-- Stopwatch top button -->
  <rect x="452" y="120" width="120" height="80" rx="20" fill="black"/>
  
  <!-- Clock hand -->
  <line x1="512" y1="560" x2="700" y2="420" stroke="black" stroke-width="40" stroke-linecap="round"/>
  <circle cx="512" cy="560" r="40" fill="black"/>
  
  <!-- Fork (left side) -->
  <line x1="350" y1="520" x2="350" y2="720" stroke="black" stroke-width="30" stroke-linecap="round"/>
  <line x1="320" y1="520" x2="320" y2="600" stroke="black" stroke-width="20" stroke-linecap="round"/>
  <line x1="350" y1="520" x2="350" y2="600" stroke="black" stroke-width="20" stroke-linecap="round"/>
  <line x1="380" y1="520" x2="380" y2="600" stroke="black" stroke-width="20" stroke-linecap="round"/>
  
  <!-- Crescent moon (right side) -->
  <path d="M650 650
           A180 180 0 1 1 650 470
           A120 180 0 1 0 650 650"
        fill="black"/>
</svg>
